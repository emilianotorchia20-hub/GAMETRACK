name: Release GameTrack

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-windows:
    name: Build and release Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Check version sync
        run: npm run version:check

      - name: Build frontend
        run: npm run build

      - name: Rust check
        working-directory: src-tauri
        run: cargo check

      - name: Extract changelog notes
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $content = Get-Content CHANGELOG.md -Raw
          $pattern = "(?ms)^## \[$([regex]::Escape($version))\].*?\n(?<body>.*?)(?=^## \[|\z)"
          $match = [regex]::Match($content, $pattern)
          if ($match.Success) {
            $body = $match.Groups["body"].Value.Trim()
          } else {
            $body = "Release $version"
          }
          $body | Out-File -FilePath release-notes.md -Encoding utf8

      - name: Build Tauri release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "GameTrack ${{ github.ref_name }}"
          releaseBodyPath: release-notes.md
          releaseDraft: false
          prerelease: false
          args: --target x86_64-pc-windows-msvc
