<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>
        GameTrack
    </title>

    <!-- =========================
         🎨 CSS BASE
    ========================== -->

    <link rel="stylesheet" href="./CSS/base.css">
    <link rel="stylesheet" href="./CSS/layout.css">
    <link rel="stylesheet" href="./CSS/utilities.css">

    <!-- =========================
         🧩 COMPONENTES
    ========================== -->

    <link rel="stylesheet" href="./CSS/components/animations.css">
    <link rel="stylesheet" href="./CSS/components/alerts.css">
    <link rel="stylesheet" href="./CSS/components/background.css">
    <link rel="stylesheet" href="./CSS/components/buttons.css">
    <link rel="stylesheet" href="./CSS/components/cards.css">
    <link rel="stylesheet" href="./CSS/components/dashboard.css">
    <link rel="stylesheet" href="./CSS/components/forms.css">
    <link rel="stylesheet" href="./CSS/components/history.css">
    <link rel="stylesheet" href="./CSS/components/install.css">
    <link rel="stylesheet" href="./CSS/components/loader.css">
    <link rel="stylesheet" href="./CSS/components/logo.css">
    <link rel="stylesheet" href="./CSS/components/navbar.css">
    <link rel="stylesheet" href="./CSS/components/roulette.css">
    <link rel="stylesheet" href="./CSS/components/settings.css">
    <link rel="stylesheet" href="./CSS/components/stats.css">

    <!-- =========================
         🔔 TOASTIFY
    ========================== -->

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css"
    >

    <!-- =========================
         📱 PWA
    ========================== -->

    <link rel="manifest" href="./manifest.json">

    <meta
        name="theme-color"
        content="#0f172a"
    >

</head>

<body>

    <!-- =========================
         🌌 BACKGROUND FX
    ========================== -->

    <div class="bg-light"></div>
    <div class="bg-shine"></div>
    <div class="bg-noise"></div>

    <!-- ✨ PARTICLES -->

    <div class="particles">

        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>

    </div>

    <!-- =========================
         🎬 LOADER
    ========================== -->

    <div id="loader">

        <div class="loader-content">

            <div class="loader-logo"></div>

            <h1>

                GAMETRACK99

            </h1>

            <div class="loader-subtitle">

                Casino Session Tracker

            </div>

            <div class="loader-bar">

                <div class="loader-progress"></div>

            </div>

        </div>

    </div>

    <!-- =========================
         🔝 NAVBAR
    ========================== -->

    <nav>

        <a
            href="./index.html"
            class="active"
        >
            Inicio
        </a>

        <a href="./PAGES/historial/index.html">

            Historial

        </a>

        <a href="./PAGES/estadisticas/index.html">

            Estadísticas

        </a>

        <a href="./PAGES/insights/index.html">

            Insights

        </a>

        <a href="./PAGES/configuracion/index.html">

            Configuración

        </a>

        <a href="./PAGES/roulette/index.html">

            Ruleta

        </a>

    </nav>

    <!-- =========================
         🏠 MAIN
    ========================== -->

    <main>

        <!-- 🎰 LOGO -->

        <div class="logo">

            <div class="logo-glow"></div>

            <div class="logo-icon-wrap">

                <div class="roulette-mini">

                    <div class="roulette-center"></div>

                </div>

                <div class="cards">

                    <div class="card back"></div>

                    <div class="card front">

                        ♠

                    </div>

                </div>

                <div class="chips">

                    <span class="chip red"></span>
                    <span class="chip black"></span>

                </div>

            </div>

            <div class="logo-text-wrap">

                <span class="logo-text">

                    GAMETRACK

                </span>

                <div class="logo-line"></div>

            </div>

            <div class="logo-shine"></div>

        </div>

        <!-- =========================
             👑 DASHBOARD HERO
        ========================== -->

        <section class="dashboard-hero">

            <!-- 💎 HERO -->

            <div class="hero-main">

                <div class="hero-subtitle">

                    Casino Analytics

                </div>

                <h1 class="hero-title">

                    Bienvenido de nuevo

                </h1>

                <!-- 💰 PROFIT -->

                <div
                    class="hero-profit"
                    id="dashboardProfit"
                >

                    $0

                </div>

                <!-- 📊 STATS -->

                <div class="hero-stats">

                    <div class="hero-stat">

                        <div class="hero-stat-label">

                            Winrate

                        </div>

                        <div
                            class="hero-stat-value"
                            id="dashboardWinrate"
                        >

                            0%

                        </div>

                    </div>

                    <div class="hero-stat">

                        <div class="hero-stat-label">

                            Sesiones

                        </div>

                        <div
                            class="hero-stat-value"
                            id="dashboardSessions"
                        >

                            0

                        </div>

                    </div>

                    <div class="hero-stat">

                        <div class="hero-stat-label">

                            ROI

                        </div>

                        <div
                            class="hero-stat-value"
                            id="dashboardROI"
                        >

                            0%

                        </div>

                    </div>

                </div>

            </div>

            <!-- 👤 PLAYER -->

            <div class="player-card">

                <div class="player-level">

                    <div class="player-badge"></div>

                    <div class="player-info">

                        <h3 id="dashboardLevel">

                            Rookie

                        </h3>

                        <p>

                            Nivel automático

                        </p>

                    </div>

                </div>

                <!-- 📋 ACTIVIDAD -->

                <div
                    class="activity-list"
                    id="activityList"
                >

                </div>

            </div>

        </section>

        <!-- 🎰 FORMULARIO -->

        <div class="form-container">

            <h2>

                Nueva sesión

            </h2>

            <form id="formSesion">

                <!-- 🎮 JUEGO -->

                <div class="form-group">

                    <label for="game">

                        Tipo de juego

                    </label>

                    <select id="game">

                        <option>Ruleta</option>
                        <option>Blackjack</option>
                        <option>Tragamonedas</option>
                        <option>Mines</option>
                        <option>Dice</option>
                        <option>Plinko</option>
                        <option>Keno</option>
                        <option>Chicken</option>
                        <option>Moles</option>
                        <option>Dragon Tower</option>
                        <option>Flip</option>
                        <option>Rock Paper Scissors</option>
                        <option>Cases</option>

                    </select>

                </div>

                <!-- 💰 DINERO INICIAL -->

                <div class="form-group">

                    <label for="inicial">

                        Dinero inicial

                    </label>

                    <input
                        type="number"
                        id="inicial"
                        required
                    >

                </div>

                <!-- 💵 DINERO FINAL -->

                <div class="form-group">

                    <label for="final">

                        Dinero final

                    </label>

                    <input
                        type="number"
                        id="final"
                        required
                    >

                </div>

                <!-- 📝 NOTAS -->

                <div class="form-group">

                    <label for="notes">

                        Notas

                    </label>

                    <textarea
                        id="notes"
                        placeholder="Opcional..."
                    ></textarea>

                </div>

                <!-- 🚀 SUBMIT -->

                <button type="submit">

                    Guardar sesión

                </button>

            </form>

        </div>

    </main>

    <!-- =========================
         📲 INSTALL BUTTON
    ========================== -->

    <button
        id="installBtn"
        class="install-btn"
        style="display:none;"
    >

        📲 Instalar App

    </button>

    <!-- =========================
         🔔 TOASTIFY
    ========================== -->

    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

    <!-- =========================
         🔧 JAVASCRIPT
    ========================== -->

    <script src="./JS/storage.js"></script>
    <script src="./JS/alerts.js"></script>
    <script src="./JS/sessions.js"></script>
    <script src="./JS/ui.js"></script>
    <script src="./JS/app.js"></script>

</body>

</html>
